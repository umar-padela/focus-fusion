# FocusFusion — shared config for E1 and E2.
# E0 (LitePT baseline, Person 1) uses configs/e0.yaml.

experiment: e1
seed: 231

data:
  dataroot: /experiments/data   # Modal volume path; override locally with --data-root data
  version: v1.0-mini
  train_split: mini_train
  val_split: mini_val

model:
  # --- LiDAR backbone ---
  lidar_backbone: litept        # frozen; Q = zeros stub until Person 1 exposes backbone features
  d_l: 72                       # backbone_out_channels from semseg-litept-v1m1-0-small.py
  litept:
    config: /root/Pointcept/configs/nuscenes/semseg-litept-v1m1-0-small.py  # Pointcept repo path in Modal container

  # --- Vision backbone (frozen DINOv2 ViT-S/14) ---
  d_v: 384                      # patch embedding dim
  img_size: 448                 # must be divisible by 14; P = (448/14)^2 = 1024 patches
  normalize_input: true         # DINOv2Backbone applies ImageNet mean/std internally

  # --- Fusion ---
  d_f: 256                      # cross-attention hidden dim
  num_heads: 8
  dropout: 0.1
  head_hidden_dim: 128

  # --- Classes (Person 1's 16-class challenge mapping) ---
  num_classes: 16
  N_points: 16384               # fixed LiDAR point count (subsampled in dataloader)

  # --- Temporal ---
  T: 1                          # 1 = E1 (single frame); 6 = E2 (3s at 2Hz)

  # --- Positional embeddings ---
  use_temporal_pe: true         # sinusoidal PE over T frame positions; useful for E2
  use_camera_pe: true           # learned embedding per camera (6 cameras); useful for E1+E2

  # --- Eval ---
  eval_mode: false              # true = export attn_weights for visualisation

train:
  epochs: 10
  batch_size: 12
  lr: 1.0e-4
  lr_schedule: constant
  lr_min: 1.0e-6
  weight_decay: 5.0e-3
  num_workers: 4
  val_every_epochs: 1

loss:
  num_classes: 16
  ignore_index: -1              # void / padded points
  lovasz_weight: 0.0            # disabled until CE baseline is stable; re-enable at 0.1

checkpoints:
  litept: /experiments/checkpoints/litept/model_best.pth   # Modal volume path

wandb:
  project: focus-fusion          # isolated W&B project — won't mix with other projects
  entity: null                   # your W&B username or team; null = W&B default
  run_name: null                 # null = use experiment tag (e1, e2)
